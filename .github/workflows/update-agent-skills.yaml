name: 🔄 Update Agent Skills

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    uses: devantler-tech/reusable-workflows/.github/workflows/update-agent-skills.yaml@ad99c16f59e9e205d1cbd4d511c949aa353670b7 # v5.0.0
    with:
      dir: plugins
      # Create the update PR with a GitHub App token so it triggers this
      # repo's required CI (a PR opened with GITHUB_TOKEN does not), instead
      # of landing permanently blocked on missing required checks.
      use-app-token: true
    secrets:
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
