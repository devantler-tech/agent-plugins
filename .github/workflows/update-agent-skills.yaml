name: 🔄 Update Agent Skills

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    uses: devantler-tech/actions/.github/workflows/update-agent-skills.yaml@061b345a7351b0caf23055caea63ccd08b75e20e # v8.0.0
    with:
      dir: plugins
      # Create the update PR with a GitHub App token so it triggers this
      # repo's required CI (a PR opened with GITHUB_TOKEN does not), instead
      # of landing permanently blocked on missing required checks.
      use-app-token: true
    secrets:
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
