name: 🔄 Update Copilot Skills

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    uses: devantler-tech/reusable-workflows/.github/workflows/update-copilot-skills.yaml@cd0166067f2d85ae461b288b68d8d82e62221b82 # v3.3.0
    with:
      dir: plugins
      # Create the update PR with a GitHub App token so it triggers this
      # repo's required CI (a PR opened with GITHUB_TOKEN does not), instead
      # of landing permanently blocked on missing required checks.
      use-app-token: true
    secrets:
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
